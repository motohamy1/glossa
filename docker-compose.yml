version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/glossa
      - REDIS_URL=redis://redis:6379
      # Translation is handled by the local ML service (flan-t5-base)
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    command: pnpm dev

  ml-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ml
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=google/flan-t5-base
      - REDIS_URL=redis://redis:6379
      - DEVICE=cpu
    volumes:
      - model-cache:/models
      - ./apps/ml-service:/app
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=glossa
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  model-cache:
